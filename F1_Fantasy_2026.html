<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏎️ F1 Fantasy 2026</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1e1e2a;
    --border: #2a2a3a;
    --accent: #e10600;
    --accent2: #ff8700;
    --gold: #ffd700;
    --silver: #c0c0c0;
    --bronze: #cd7f32;
    --text: #f0f0f0;
    --muted: #888;
    --green: #00d46a;
    --red: #e10600;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* Header */
  .header { background: linear-gradient(135deg, #0d0d14 0%, #1a0005 100%); border-bottom: 2px solid var(--accent); padding: 20px 32px; display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; }
  .header h1 span { color: var(--accent); }
  .header .subtitle { color: var(--muted); font-size: 0.85rem; margin-top: 2px; }
  .header-right { margin-left: auto; text-align: right; }
  .last-updated { font-size: 0.75rem; color: var(--muted); }
  .refresh-btn { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 600; margin-top: 4px; transition: opacity 0.2s; }
  .refresh-btn:hover { opacity: 0.85; }
  .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Nav Tabs */
  .nav { display: flex; gap: 2px; padding: 0 32px; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; }
  .nav-tab { padding: 12px 20px; cursor: pointer; font-size: 0.85rem; font-weight: 600; color: var(--muted); border-bottom: 3px solid transparent; white-space: nowrap; transition: all 0.2s; }
  .nav-tab:hover { color: var(--text); background: var(--surface2); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .nav-tab.completed::after { content: ' ✓'; color: var(--green); font-size: 0.7rem; }

  /* Main content */
  .main { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Standings */
  .standings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .player-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; overflow: hidden; transition: border-color 0.2s, transform 0.2s; }
  .player-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .player-card.rank-1 { border-color: var(--gold); background: linear-gradient(135deg, var(--surface) 0%, #1a1500 100%); }
  .player-card.rank-2 { border-color: var(--silver); }
  .player-card.rank-3 { border-color: var(--bronze); }
  .player-rank { position: absolute; top: 12px; right: 14px; font-size: 2rem; font-weight: 900; opacity: 0.15; }
  .player-rank.rank-1 { color: var(--gold); opacity: 0.4; }
  .player-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
  .player-pts { font-size: 2rem; font-weight: 800; color: var(--accent); }
  .player-pts-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .player-drivers { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 4px; }
  .driver-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-size: 0.72rem; color: var(--muted); }
  .driver-chip.highlight { border-color: var(--accent2); color: var(--accent2); }
  .rank-badge { display: inline-block; width: 22px; height: 22px; border-radius: 50%; font-size: 0.75rem; font-weight: 700; text-align: center; line-height: 22px; margin-right: 8px; }
  .rank-badge.r1 { background: var(--gold); color: #000; }
  .rank-badge.r2 { background: var(--silver); color: #000; }
  .rank-badge.r3 { background: var(--bronze); color: #000; }
  .rank-badge.r4, .rank-badge.r5 { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

  /* Section headers */
  .section-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .section-title .badge { background: var(--accent); color: white; font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; font-weight: 700; text-transform: uppercase; }

  /* Race history table */
  .race-history { overflow-x: auto; margin-top: 16px; }
  .table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  .table th { background: var(--surface2); padding: 10px 12px; text-align: left; font-weight: 600; color: var(--muted); text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .table td { padding: 9px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .table tr:hover td { background: var(--surface2); }
  .table td.pts-pos { color: var(--green); font-weight: 700; }
  .table td.pts-neg { color: var(--red); font-weight: 700; }
  .table td.pts-zero { color: var(--muted); }
  .table .total-row td { background: var(--surface2); font-weight: 700; border-top: 2px solid var(--border); }
  .sticky-col { position: sticky; left: 0; background: var(--surface); z-index: 1; }
  .table tr:hover .sticky-col { background: var(--surface2); }

  /* Race detail */
  .race-select-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .race-select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 8px; font-size: 0.9rem; cursor: pointer; }
  .race-status-pill { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
  .race-status-pill.done { background: #00271a; color: var(--green); border: 1px solid var(--green); }
  .race-status-pill.pending { background: #1a1400; color: var(--accent2); border: 1px solid var(--accent2); }
  .race-status-pill.skipped { background: #1a0a0a; color: var(--muted); border: 1px solid var(--border); }

  /* Driver table */
  .driver-score-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; margin-top: 16px; }
  .driver-score-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .driver-score-card .driver-name { font-weight: 700; font-size: 1rem; margin-bottom: 10px; }
  .driver-score-card .score-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.82rem; padding: 3px 0; border-bottom: 1px solid var(--border); }
  .driver-score-card .score-row:last-child { border-bottom: none; font-weight: 700; font-size: 0.9rem; }
  .score-label { color: var(--muted); }

  /* Charts area */
  .chart-container { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .chart-title { font-size: 0.9rem; font-weight: 600; color: var(--muted); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
  .bar-chart { display: flex; flex-direction: column; gap: 8px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-label { width: 80px; font-size: 0.82rem; font-weight: 600; white-space: nowrap; }
  .bar-track { flex: 1; height: 28px; background: var(--surface2); border-radius: 4px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; font-size: 0.75rem; font-weight: 700; }
  .bar-pts { width: 50px; text-align: right; font-size: 0.82rem; font-weight: 700; }

  /* Progress line chart (CSS-based) */
  .progress-chart { position: relative; overflow-x: auto; }
  .progress-svg { display: block; }

  /* Status indicator */
  .api-status { display: inline-flex; align-items: center; gap: 6px; font-size: 0.75rem; }
  .api-dot { width: 8px; height: 8px; border-radius: 50%; }
  .api-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
  .api-dot.offline { background: var(--muted); }
  .api-dot.error { background: var(--red); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* Notification toast */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 20px; font-size: 0.82rem; z-index: 1000; transform: translateY(100px); opacity: 0; transition: all 0.3s; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--green); }
  .toast.error { border-color: var(--red); }

  /* Responsive */
  @media (max-width: 600px) { .main { padding: 16px; } .header { padding: 14px 16px; } .nav { padding: 0 16px; } .standings-grid { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🏎️ F1 <span>Fantasy</span> 2026</h1>
    <div class="subtitle">Jan · Pascal · FloN · FloG · Marie</div>
  </div>
  <div class="header-right">
    <div class="last-updated">Aktualisiert: <span id="lastUpdated">–</span></div>
    <div class="api-status" style="margin: 4px 0; justify-content: flex-end;">
      <div class="api-dot" id="apiDot"></div>
      <span id="apiStatusText">Verbinde...</span>
    </div>
    <button class="refresh-btn" onclick="fetchLatestResults()" id="refreshBtn">🔄 Aktualisieren</button>
  </div>
</div>

<div class="nav" id="mainNav">
  <div class="nav-tab active" onclick="showTab('standings')" data-tab="standings">🏆 Rangliste</div>
  <div class="nav-tab" onclick="showTab('history')" data-tab="history">📊 Rennergebnisse</div>
  <div class="nav-tab" onclick="showTab('racedetail')" data-tab="racedetail">🔍 Renn-Details</div>
  <div class="nav-tab" onclick="showTab('drivers')" data-tab="drivers">👤 Fahrer</div>
</div>

<div class="main">
  <!-- STANDINGS TAB -->
  <div class="tab-content active" id="tab-standings">
    <div class="section-title">🏆 Gesamtwertung <span class="badge" id="raceCountBadge">0 Rennen</span></div>
    <div class="standings-grid" id="standingsGrid"></div>

    <div class="section-title">📈 Punkteentwicklung
      <button id="chartToggleBtn" onclick="toggleChartView()" style="margin-left:auto;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:0.75rem;font-weight:600;">Alle 23 Rennen</button>
    </div>
    <div class="chart-container">
      <div style="overflow-x:auto;"><svg id="progressChart" class="progress-svg" height="320"></svg></div>
    </div>

    <div class="section-title">📊 Letzte Rennergebnisse</div>
    <div class="chart-container">
      <div class="chart-title">Punkte im letzten Rennen</div>
      <div class="bar-chart" id="lastRaceBar"></div>
    </div>
  </div>

  <!-- HISTORY TAB -->
  <div class="tab-content" id="tab-history">
    <div class="section-title">📊 Punkte aller Rennen</div>
    <div class="race-history" id="historyTable"></div>
  </div>

  <!-- RACE DETAIL TAB -->
  <div class="tab-content" id="tab-racedetail">
    <div class="race-select-row">
      <select class="race-select" id="raceSelect" onchange="renderRaceDetail()"></select>
      <div class="race-status-pill" id="raceStatusPill">–</div>
    </div>
    <div id="raceDetailContent"></div>
  </div>

  <!-- DRIVERS TAB -->
  <div class="tab-content" id="tab-drivers">
    <div class="section-title">👤 Fahrerübersicht</div>
    <div class="race-history" id="driversTable"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// DATA — extracted from Excel sheet
// NOTE: Australia (Race 1) does NOT count — game started from China
// NOTE: Bahrain and Saudi-Arabien are CANCELED
// ============================================================
const TEAMS = {
  'Jan':    { drivers: ['Russell', 'Hamilton', 'Hülkenberg', 'Gasly'], color: '#3b82f6' },
  'Pascal': { drivers: ['Verstappen', 'Hadjar', 'Sainz', 'Ocon'],     color: '#f59e0b' },
  'FloN':   { drivers: ['Leclerc', 'Norris', 'Lindblad', 'Bearman'],  color: '#22c55e' },
  'FloG':   { drivers: ['Antonelli', 'Piastri', 'Bortoleto', 'Albon'], color: '#a855f7' },
  'Marie':  { drivers: ['Alonso', 'Bottas', 'Colapinto', 'Lawson', 'Perez', 'Stroll'], color: '#ec4899' },
};

// All 24 races in order (Australia = index 0, does NOT count)
const RACES = [
  'Australien', 'China', 'Japan', 'Bahrain', 'Saudi-Arabien', 'USA',
  'Kanada', 'Monaco', 'Spanien', 'Österreich', 'Großbritannien', 'Belgien',
  'Ungarn', 'Niederlande', 'Italien', 'Spanien II', 'Aserbaidschan', 'Singapur',
  'USA II', 'Mexiko', 'Brasilien', 'USA III', 'Katar', 'Abu Dhabi'
];

// Scoring rules
// Qualifying: P1=10, P2=9, ..., P10=1, P11+=0
// Race: P1=20, P2=19, ..., P20=1, P21+=0
// Positions gained: each position gained = +1 (positions lost = negative counted in pos_gained)
// DNF = -5 race points, 0 qualifying points if DNF

// Race data from Excel. Key: driver name. Australia is included for reference but excluded from scoring.
// Race data is populated from the API via fetchLatestResults().
// Canceled races are pre-set to null; all others start empty.
const RACE_DATA = {
  'Australien':    {},
  'China':         {},
  'Japan':         {},
  'Bahrain':       null,  // CANCELED
  'Saudi-Arabien': null,  // CANCELED
  'USA':           {},
  'Kanada':        {},
  'Monaco':        {},
  'Spanien':       {},
  'Österreich':    {},
  'Großbritannien':{},
  'Belgien':       {},
  'Ungarn':        {},
  'Niederlande':   {},
  'Italien':       {},
  'Spanien II':    {},
  'Aserbaidschan': {},
  'Singapur':      {},
  'USA II':        {},
  'Mexiko':        {},
  'Brasilien':     {},
  'USA III':       {},
  'Katar':         {},
  'Abu Dhabi':     {},
};

// FIRST_RACE_INDEX: 0 = Australien, 1 = China (first counting race)
const FIRST_COUNTING_RACE = 1; // China is first counting race
const CANCELED_RACES = new Set(['Bahrain', 'Saudi-Arabien']);

// Computed: per-player per-race points
function getPlayerRacePoints(player, race) {
  const drivers = TEAMS[player].drivers;
  if (CANCELED_RACES.has(race)) return null; // canceled race
  const data = RACE_DATA[race];
  if (!data || Object.keys(data).length === 0) return null; // race not yet played
  let total = 0;
  drivers.forEach(d => {
    if (data[d]) total += (data[d].overall || 0);
  });
  return total;
}

function getAllDriversForRace() {
  return Object.keys(TEAMS).flatMap(p => TEAMS[p].drivers);
}

function getRaceStatus(raceIdx) {
  if (raceIdx < FIRST_COUNTING_RACE) return 'skipped'; // Australia
  const race = RACES[raceIdx];
  if (CANCELED_RACES.has(race)) return 'canceled';
  const data = RACE_DATA[race];
  if (!data || Object.keys(data).length === 0) return 'pending';
  return 'done';
}

function computeStandings() {
  const standings = Object.keys(TEAMS).map(player => {
    let total = 0;
    const racePoints = [];
    for (let i = FIRST_COUNTING_RACE; i < RACES.length; i++) {
      const pts = getPlayerRacePoints(player, RACES[i]);
      racePoints.push(pts !== null ? pts : null);
      if (pts !== null) total += pts;
    }
    return { player, total, racePoints };
  });
  standings.sort((a, b) => b.total - a.total);
  return standings;
}

// ============================================================
// RENDER FUNCTIONS
// ============================================================
function renderStandings() {
  const standings = computeStandings();
  const completedRaces = RACES.slice(FIRST_COUNTING_RACE).filter(r => RACE_DATA[r] && Object.keys(RACE_DATA[r]).length > 0);
  document.getElementById('raceCountBadge').textContent = `${completedRaces.length} Rennen`;

  const grid = document.getElementById('standingsGrid');
  grid.innerHTML = standings.map((s, i) => {
    const rank = i + 1;
    const badgeClass = rank <= 3 ? `r${rank}` : `r4`;
    const cardClass = rank <= 3 ? `rank-${rank}` : '';
    const drivers = TEAMS[s.player].drivers;
    const color = TEAMS[s.player].color;
    return `<div class="player-card ${cardClass}">
      <div class="player-rank rank-${rank}">#${rank}</div>
      <div class="player-name"><span class="rank-badge ${badgeClass}">${rank}</span>${s.player}</div>
      <div class="player-pts" style="color:${color}">${s.total}</div>
      <div class="player-pts-label">Punkte Gesamt</div>
      <div class="player-drivers">
        ${drivers.map(d => `<span class="driver-chip">${d}</span>`).join('')}
      </div>
    </div>`;
  }).join('');

  renderProgressChart(standings, _chartShowAll || false);
  renderLastRaceBar(standings);
}

let _chartShowAll = false;
function toggleChartView() {
  _chartShowAll = !_chartShowAll;
  const btn = document.getElementById('chartToggleBtn');
  const title = document.getElementById('chartTitle');
  btn.textContent = _chartShowAll ? 'Kompaktansicht' : 'Alle 23 Rennen';
  // subtitle removed
  renderProgressChart(computeStandings(), _chartShowAll);
}

function renderProgressChart(standings, showAll) {
  // ALL counting races (China → Abu Dhabi), including canceled for markers
  const allCountingRaces = RACES.slice(FIRST_COUNTING_RACE);
  const doneRaces = allCountingRaces.filter(r => !CANCELED_RACES.has(r) && RACE_DATA[r] && Object.keys(RACE_DATA[r]).length > 0);

  if (doneRaces.length === 0) {
    document.getElementById('progressChart').innerHTML = '<text x="20" y="30" fill="#888" font-size="14">Noch keine Rennen abgeschlossen.</text>';
    return;
  }

  // Next 2 upcoming (non-canceled) races
  const upcomingNonCanceled = allCountingRaces.filter(r => !CANCELED_RACES.has(r) && (!RACE_DATA[r] || Object.keys(RACE_DATA[r]).length === 0));
  const next2List = upcomingNonCanceled.slice(0, 2);
  const next2 = new Set(next2List);

  // Windowed mode: last 4 done races + up to 2 upcoming + canceled races in between
  let displayRaces;
  if (showAll) {
    displayRaces = allCountingRaces; // all 23
  } else {
    const last4Done = doneRaces.slice(-4);
    // Include all races from the first of last4Done onwards (to show canceled races in-between)
    const windowStart = allCountingRaces.indexOf(last4Done[0]);
    const windowEnd = allCountingRaces.indexOf(next2List[1] ?? next2List[0] ?? last4Done[last4Done.length - 1]);
    displayRaces = allCountingRaces.slice(windowStart, windowEnd + 1);
  }

  // Indices within displayRaces
  const totalCols = displayRaces.length;
  const H = 320;
  const PAD = { top: 28, right: 80, bottom: 58, left: 54 };
  const chartW = 900;
  const chartH = H - PAD.top - PAD.bottom;
  const fullW = chartW + PAD.left + PAD.right;

  // Max based on ALL done races (so windowed view uses same scale as full view)
  const allMax = Math.max(1, ...standings.map(s => {
    let c = 0, max = 0;
    doneRaces.forEach(r => {
      const idx = RACES.indexOf(r) - FIRST_COUNTING_RACE;
      c += (s.racePoints[idx] || 0);
      if (c > max) max = c;
    });
    return max;
  }));

  // x position for a race by its index in allCountingRaces
  // xOf maps displayRaces index to x coordinate
  const xOf = i => totalCols <= 1 ? chartW / 2 : (i / (totalCols - 1)) * chartW;

  const svg = document.getElementById('progressChart');
  svg.setAttribute('viewBox', `0 0 ${fullW} ${H}`);
  svg.setAttribute('preserveAspectRatio', 'none');
  svg.style.width = '100%';
  svg.style.height = `${H}px`;
  svg.removeAttribute('width');

  let html = `<g transform="translate(${PAD.left},${PAD.top})">`;

  // Shade next-2 upcoming races
  displayRaces.forEach((r, i) => {
    if (next2.has(r)) {
      const colHalfW = totalCols > 1 ? (chartW / (totalCols - 1)) / 2 : 20;
      const x0 = Math.max(0, xOf(i) - colHalfW);
      const x1 = Math.min(chartW, xOf(i) + colHalfW);
      html += `<rect x="${x0}" y="0" width="${x1 - x0}" height="${chartH}" fill="#1e1e2a" rx="2"/>`;
    }
  });

  // Grid lines (horizontal)
  for (let g = 0; g <= 4; g++) {
    const y = chartH - (g / 4) * chartH;
    const val = Math.round((g / 4) * allMax);
    html += `<line x1="0" y1="${y}" x2="${chartW}" y2="${y}" stroke="#2a2a3a" stroke-width="1"/>`;
    html += `<text x="-6" y="${y + 4}" fill="#666" font-size="12" text-anchor="end">${val}</text>`;
  }

  // X-axis labels
  displayRaces.forEach((r, i) => {
    const x = xOf(i);
    const isCanceled = CANCELED_RACES.has(r);
    const isDone = !isCanceled && RACE_DATA[r] && Object.keys(RACE_DATA[r]).length > 0;
    const isNext2 = next2.has(r);

    if (isCanceled) {
      html += `<line x1="${x}" y1="0" x2="${x}" y2="${chartH}" stroke="#5a1a1a" stroke-width="1.5" stroke-dasharray="4,3"/>`;
      html += `<text x="${x}" y="${chartH + 17}" fill="#5a1a1a" font-size="10" text-anchor="middle">\uD83D\uDEAB${r.substring(0,5)}</text>`;
    } else {
      html += `<line x1="${x}" y1="${chartH}" x2="${x}" y2="${chartH + 5}" stroke="${isDone ? '#666' : '#444'}" stroke-width="1"/>`;
      const fill = isDone ? '#999' : isNext2 ? '#606060' : '#484848';
      html += `<text x="${x}" y="${chartH + 19}" fill="${fill}" font-size="${showAll ? 9 : 11}" text-anchor="middle" ${isNext2 ? 'font-style="italic"' : ''}>${r.substring(0, showAll ? 5 : 7)}</text>`;
      if (isNext2) {
        html += `<text x="${x}" y="${chartH + 33}" fill="#505050" font-size="9" text-anchor="middle" font-style="italic">ausst.</text>`;
      }
    }
  });

  // Player lines — cumulative through ALL done races, plotted at their displayRaces x positions
  // Pre-compute cumulative totals up to each done race
  standings.forEach(s => {
    const color = TEAMS[s.player].color;

    // Build cumulative points at each done race that's in displayRaces
    let cumAll = 0; // running total across ALL done races (for correct cumulative value)
    // First compute cumulative at every done race in order
    const cumByRace = {};
    doneRaces.forEach(r => {
      const idx = RACES.indexOf(r) - FIRST_COUNTING_RACE;
      cumAll += (s.racePoints[idx] || 0);
      cumByRace[r] = cumAll;
    });

    // Now build display points only for done races visible in window
    const visibleDone = displayRaces.filter(r => doneRaces.includes(r));
    const pts = visibleDone.map(r => ({
      x: xOf(displayRaces.indexOf(r)),
      y: chartH - (cumByRace[r] / allMax) * chartH
    }));

    if (pts.length === 0) return;

    if (pts.length === 1) {
      html += `<circle cx="${pts[0].x}" cy="${pts[0].y}" r="4" fill="${color}"/>`;
    } else {
      const pathD = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x},${p.y}`).join(' ');
      html += `<path d="${pathD}" stroke="${color}" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>`;
    }

    // End dot + name label
    const last = pts[pts.length - 1];
    html += `<circle cx="${last.x}" cy="${last.y}" r="4" fill="${color}"/>`;
    // Only show label if it fits (label at end point, shift right slightly)
    html += `<text x="${last.x + 8}" y="${last.y + 5}" fill="${color}" font-size="13" font-weight="700">${s.player}</text>`;
  });

  html += '</g>';
  svg.innerHTML = html;
}

function renderLastRaceBar(standings) {
  const countingRaces = RACES.slice(FIRST_COUNTING_RACE).filter(r => RACE_DATA[r] && Object.keys(RACE_DATA[r]).length > 0);
  if (countingRaces.length === 0) { document.getElementById('lastRaceBar').innerHTML = '<span style="color:var(--muted)">Noch kein Rennen.</span>'; return; }
  const lastRace = countingRaces[countingRaces.length - 1];
  const raceIdx = countingRaces.length - 1;
  
  const data = standings.map(s => ({ player: s.player, pts: s.racePoints[raceIdx] || 0, color: TEAMS[s.player].color }));
  data.sort((a, b) => b.pts - a.pts);
  const maxPts = Math.max(...data.map(d => d.pts), 1);

  document.getElementById('lastRaceBar').innerHTML = data.map(d => `
    <div class="bar-row">
      <div class="bar-label">${d.player}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${Math.max(0, d.pts) / maxPts * 100}%;background:${d.color};color:#000">
          ${d.pts > 0 ? d.pts : ''}
        </div>
      </div>
      <div class="bar-pts" style="color:${d.pts >= 0 ? d.color : 'var(--red)'}">${d.pts}</div>
    </div>`).join('');
}

function renderHistory() {
  const countingRaces = RACES.slice(FIRST_COUNTING_RACE);
  const players = Object.keys(TEAMS);
  const standings = computeStandings();

  let html = `<table class="table"><thead><tr>
    <th class="sticky-col">Spieler</th>
    ${countingRaces.map((r, i) => {
      const status = getRaceStatus(i + FIRST_COUNTING_RACE);
      const label = status === 'canceled' ? `🚫 ${r}` : r;
      return `<th style="${status === 'canceled' ? 'color:var(--muted);text-decoration:line-through' : ''}">${label}</th>`;
    }).join('')}
    <th>Gesamt</th>
  </tr></thead><tbody>`;

  standings.forEach(s => {
    html += `<tr><td class="sticky-col" style="font-weight:700">${s.player}</td>`;
    countingRaces.forEach((r, i) => {
      const status = getRaceStatus(i + FIRST_COUNTING_RACE);
      const pts = s.racePoints[i];
      if (status === 'canceled') {
        html += `<td class="pts-zero" title="Abgesagt">🚫</td>`;
      } else if (pts === null) {
        html += `<td class="pts-zero">–</td>`;
      } else if (pts > 0) {
        html += `<td class="pts-pos">+${pts}</td>`;
      } else if (pts < 0) {
        html += `<td class="pts-neg">${pts}</td>`;
      } else {
        html += `<td class="pts-zero">0</td>`;
      }
    });
    html += `<td class="pts-pos" style="font-weight:800">${s.total}</td></tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('historyTable').innerHTML = html;
}

function renderRaceSelect() {
  const sel = document.getElementById('raceSelect');
  sel.innerHTML = RACES.map((r, i) => {
    const status = getRaceStatus(i);
    let label = i < FIRST_COUNTING_RACE ? `${r} (zählt nicht)` : r;
    if (status === 'canceled') label = `🚫 ${r} (abgesagt)`;
    return `<option value="${i}">${label}</option>`;
  }).join('');  
  // Default to last done race
  const lastDone = RACES.map((r, i) => i >= FIRST_COUNTING_RACE && RACE_DATA[r] && Object.keys(RACE_DATA[r]).length > 0 ? i : -1).filter(i => i >= 0);
  if (lastDone.length > 0) sel.value = lastDone[lastDone.length - 1];
  renderRaceDetail();
}

function renderRaceDetail() {
  const sel = document.getElementById('raceSelect');
  const idx = parseInt(sel.value);
  const race = RACES[idx];
  const status = getRaceStatus(idx);
  const pill = document.getElementById('raceStatusPill');

  if (status === 'skipped') {
    pill.className = 'race-status-pill skipped'; pill.textContent = '⚠️ Zählt nicht fürs Spiel';
  } else if (status === 'canceled') {
    pill.className = 'race-status-pill skipped'; pill.textContent = '🚫 Abgesagt';
  } else if (status === 'done') {
    pill.className = 'race-status-pill done'; pill.textContent = '✓ Abgeschlossen';
  } else {
    pill.className = 'race-status-pill pending'; pill.textContent = '⏳ Ausstehend';
  }

  const players = Object.keys(TEAMS);
  const data = RACE_DATA[race];

  if (CANCELED_RACES.has(race)) {
    document.getElementById('raceDetailContent').innerHTML = `<div style="color:var(--muted);padding:20px">🚫 ${race} wurde abgesagt.</div>`;
    return;
  }
  if (!data || Object.keys(data).length === 0) {
    document.getElementById('raceDetailContent').innerHTML = `<div style="color:var(--muted);padding:20px">Noch keine Daten für ${race}.</div>`;
    return;
  }

  // Player summary cards
  const playerSummaries = players.map(player => {
    const drivers = TEAMS[player].drivers;
    const color = TEAMS[player].color;
    let total = 0;
    const driverRows = drivers.map(d => {
      const dr = data[d] || {};
      const pts = dr.overall || 0;
      total += pts;
      return `<div class="score-row">
        <span class="score-label">${d}</span>
        <span style="color:${pts > 0 ? 'var(--green)' : pts < 0 ? 'var(--red)' : 'var(--muted)'}">${pts > 0 ? '+' : ''}${pts}</span>
      </div>`;
    }).join('');
    return `<div class="driver-score-card" style="border-color:${color}22">
      <div class="driver-name" style="color:${color}">${player}</div>
      ${driverRows}
      <div class="score-row"><span class="score-label">GESAMT</span><span style="color:${total > 0 ? 'var(--green)' : total < 0 ? 'var(--red)' : 'var(--muted)'}">${total > 0 ? '+' : ''}${total}</span></div>
    </div>`;
  }).join('');

  // Full driver table
  const allDrivers = Object.keys(data).sort((a, b) => (data[b].overall || 0) - (data[a].overall || 0));
  const driverRows = allDrivers.map(d => {
    const dr = data[d];
    const isDNF = dr.race_pos === 'DNF';
    const racePos = isDNF ? '<span style="background:#3a0000;color:#ff6666;padding:1px 6px;border-radius:3px;font-size:0.75rem;font-weight:700">DNF</span>' : (dr.race_pos ? `P${dr.race_pos}` : '–');
    const qualPos = dr.qual_pos ? `P${dr.qual_pos}` : '–';
    const sty = dr.overall > 0 ? 'pts-pos' : dr.overall < 0 ? 'pts-neg' : 'pts-zero';
    // Who picked this driver?
    const owner = Object.keys(TEAMS).find(p => TEAMS[p].drivers.includes(d)) || '–';
    const ownerColor = owner !== '–' ? TEAMS[owner].color : 'var(--muted)';
    return `<tr>
      <td class="sticky-col"><strong>${d}</strong></td>
      <td style="color:${ownerColor}">${owner}</td>
      <td>${qualPos}</td>
      <td class="${dr.qual_pts > 0 ? 'pts-pos' : 'pts-zero'}">${dr.qual_pts > 0 ? '+' : ''}${dr.qual_pts || 0}</td>
      <td>${racePos}</td>
      <td class="${isDNF ? 'pts-neg' : dr.race_pts > 0 ? 'pts-pos' : 'pts-zero'}">${isDNF ? '−5' : `+${dr.race_pts}`}</td>
      <td class="${dr.pos_gained > 0 ? 'pts-pos' : dr.pos_gained < 0 ? 'pts-neg' : 'pts-zero'}">${dr.pos_gained > 0 ? '+' : ''}${dr.pos_gained || 0}</td>
      <td class="${sty}" style="font-weight:700">${dr.overall > 0 ? '+' : ''}${dr.overall || 0}</td>
    </tr>`;
  }).join('');

  document.getElementById('raceDetailContent').innerHTML = `
    <div class="section-title">🏁 Team-Punkte: ${race}</div>
    <div class="driver-score-grid">${playerSummaries}</div>
    <div class="section-title" style="margin-top:24px">📋 Alle Fahrer</div>
    <div class="race-history">
      <table class="table"><thead><tr>
        <th class="sticky-col">Fahrer</th><th>Besitzer</th>
        <th>Quali Pos</th><th>Quali Pts</th>
        <th>Rennen Pos</th><th>Rennen Pts</th>
        <th>Pos Gewonnen</th><th>Gesamt</th>
      </tr></thead><tbody>${driverRows}</tbody></table>
    </div>`;
}

function renderDriversTable() {
  const countingRaces = RACES.slice(FIRST_COUNTING_RACE);
  const doneRaces = countingRaces.filter(r => RACE_DATA[r] && Object.keys(RACE_DATA[r]).length > 0);

  // All unique drivers across all teams
  const allDrivers = [...new Set(Object.values(TEAMS).flatMap(t => t.drivers))].sort();

  // Compute overall for each driver
  const driverTotals = {};
  const driverRacePts = {};
  allDrivers.forEach(d => {
    driverTotals[d] = 0;
    driverRacePts[d] = [];
    doneRaces.forEach(r => {
      const dr = RACE_DATA[r][d] || {};
      const pts = dr.overall || 0;
      driverTotals[d] += pts;
      driverRacePts[d].push(pts);
    });
  });

  const sorted = [...allDrivers].sort((a, b) => driverTotals[b] - driverTotals[a]);

  const rows = sorted.map(d => {
    const owner = Object.keys(TEAMS).find(p => TEAMS[p].drivers.includes(d)) || '–';
    const color = owner !== '–' ? TEAMS[owner].color : 'var(--muted)';
    const raceCells = driverRacePts[d].map(pts => {
      const cl = pts > 0 ? 'pts-pos' : pts < 0 ? 'pts-neg' : 'pts-zero';
      return `<td class="${cl}">${pts > 0 ? '+' : ''}${pts}</td>`;
    }).join('');
    const total = driverTotals[d];
    return `<tr>
      <td class="sticky-col"><strong>${d}</strong></td>
      <td style="color:${color}">${owner}</td>
      ${raceCells}
      <td style="font-weight:800;color:${total > 0 ? 'var(--green)' : 'var(--red)'}">${total > 0 ? '+' : ''}${total}</td>
    </tr>`;
  }).join('');

  document.getElementById('driversTable').innerHTML = `
    <table class="table"><thead><tr>
      <th class="sticky-col">Fahrer</th><th>Besitzer</th>
      ${doneRaces.map(r => `<th>${r.substring(0,8)}</th>`).join('')}
      <th>Gesamt</th>
    </tr></thead><tbody>${rows}</tbody></table>`;
}

// ============================================================
// TAB NAVIGATION
// ============================================================
function showTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');

  if (tab === 'history') renderHistory();
  if (tab === 'racedetail') renderRaceSelect();
  if (tab === 'drivers') renderDriversTable();
}

// ============================================================
// API: Auto-fetch from Jolpica (Ergast-compatible) F1 API
// https://api.jolpi.ca/ergast/f1/2026/
// ============================================================
const API_BASE = 'https://api.jolpi.ca/ergast/f1/2026/';

// Map race names (Excel) to round numbers / circuit names
// The API returns rounds in order; we match by round number
// Maps API race names (from Ergast/Jolpica) to our German game names.
// Update 'Spanien II' mapping if the 2026 calendar has a race we haven't identified yet.
const API_NAME_MAP = {
  'Australian Grand Prix':      'Australien',
  'Chinese Grand Prix':         'China',
  'Japanese Grand Prix':        'Japan',
  'Bahrain Grand Prix':         'Bahrain',
  'Saudi Arabian Grand Prix':   'Saudi-Arabien',
  'Miami Grand Prix':           'USA',
  'Canadian Grand Prix':        'Kanada',
  'Monaco Grand Prix':          'Monaco',
  'Spanish Grand Prix':         'Spanien',
  'Austrian Grand Prix':        'Österreich',
  'British Grand Prix':         'Großbritannien',
  'Belgian Grand Prix':         'Belgien',
  'Hungarian Grand Prix':       'Ungarn',
  'Dutch Grand Prix':           'Niederlande',
  'Italian Grand Prix':         'Italien',
  'Emilia Romagna Grand Prix':  'Spanien II',  // update if 2026 calendar differs
  'Azerbaijan Grand Prix':      'Aserbaidschan',
  'Singapore Grand Prix':       'Singapur',
  'United States Grand Prix':   'USA II',
  'Mexico City Grand Prix':     'Mexiko',
  'São Paulo Grand Prix':       'Brasilien',
  'Sao Paulo Grand Prix':       'Brasilien',
  'Las Vegas Grand Prix':       'USA III',
  'Qatar Grand Prix':           'Katar',
  'Abu Dhabi Grand Prix':       'Abu Dhabi',
};

// Scoring rules (as per your Excel)
function calcQualPts(pos) {
  if (!pos || typeof pos !== 'number') return 0;
  if (pos <= 10) return 11 - pos;
  return 0;
}
function calcRacePts(pos) {
  if (!pos || typeof pos !== 'number') return 0;
  if (pos <= 20) return 21 - pos;
  return 0;
}

async function fetchLatestResults() {
  const btn = document.getElementById('refreshBtn');
  const dot = document.getElementById('apiDot');
  const statusText = document.getElementById('apiStatusText');
  btn.disabled = true;
  btn.textContent = '⏳ Lade...';
  dot.className = 'api-dot';
  statusText.textContent = 'Verbinde...';

  try {
    // Fetch the full race calendar — one entry per race, not per driver.
    // Filter client-side by date to find completed races.
    const schedResp = await fetch(`${API_BASE}races.json?limit=30`);
    if (!schedResp.ok) throw new Error(`HTTP ${schedResp.status}`);
    const schedData = await schedResp.json();
    const today = new Date().toISOString().slice(0, 10); // 'YYYY-MM-DD'
    const races = schedData.MRData.RaceTable.Races.filter(r => r.date <= today);

    if (races.length === 0) {
      showToast('Noch keine Rennen in 2026 abgeschlossen.', 'error');
      dot.className = 'api-dot error'; statusText.textContent = 'Keine Daten';
      btn.disabled = false; btn.textContent = '🔄 Aktualisieren';
      return;
    }

    let updatedCount = 0;

    for (const race of races) {
      const round = parseInt(race.round);
      // Match by race name (robust against calendar round-number changes)
      const raceName = API_NAME_MAP[race.raceName];
      if (!raceName) continue;                            // unknown race
      if (CANCELED_RACES.has(raceName)) continue;         // canceled race
      // Australia is fetched so Renn-Details shows it, but it's excluded from standings

      // Fetch qualifying results
      const [qualResp, raceResp] = await Promise.all([
        fetch(`${API_BASE}${round}/qualifying.json?limit=25`),
        fetch(`${API_BASE}${round}/results.json?limit=25`)
      ]);
      const qualData = await qualResp.json();
      const raceData = await raceResp.json();

      const qualResults = qualData.MRData.RaceTable.Races[0]?.QualifyingResults || [];
      const raceResults = raceData.MRData.RaceTable.Races[0]?.Results || [];

      if (raceResults.length === 0) continue;

      // Build driver lookup by surname — normalize BOTH sides (removes umlauts, accents)
      const qualByName = {};
      qualResults.forEach(q => {
        const surname = normalizeName(q.Driver.familyName);
        qualByName[surname] = parseInt(q.position);
      });

      const raceByName = {};
      raceResults.forEach(r => {
        const surname = normalizeName(r.Driver.familyName);
        raceByName[surname] = {
          pos: parseInt(r.position),
          positionText: r.positionText, // 'R'=retired, 'D'=DSQ, number=classified
          status: r.status,
          grid: parseInt(r.grid),
        };
      });

      // All drivers in our game
      const allDrivers = [...new Set(Object.values(TEAMS).flatMap(t => t.drivers))];
      const newRaceData = {};

      allDrivers.forEach(driver => {
        // Try to match by surname (normalize umlauts)
        const norm = normalizeName(driver);
        const qualPos = qualByName[norm] || findByPartial(qualByName, norm);
        const raceEntry = raceByName[norm] || findEntryByPartial(raceByName, norm);

        // positionText: 'R'=retired, 'D'=disqualified, 'W'=did not start — all count as DNF (-5)
        // Any number = classified finisher (including lapped drivers)
        const isDNF = raceEntry && (raceEntry.positionText === 'R' || raceEntry.positionText === 'D' || raceEntry.positionText === 'W');
        const racePos = isDNF ? 'DNF' : (raceEntry ? raceEntry.pos : null);
        const grid = raceEntry ? raceEntry.grid : null;

        const qualPts = calcQualPts(qualPos);
        const racePts = isDNF ? -5 : calcRacePts(racePos);
        // Use qualifying position (not starting grid) for positions gained — matches game rules
        const posGained = (qualPos && racePos && racePos !== 'DNF') ? Math.max(0, qualPos - racePos) : 0;
        const overall = qualPts + racePts + posGained;

        newRaceData[driver] = {
          qual_pos: qualPos || null,
          qual_pts: qualPts,
          race_pos: racePos,
          race_pts: racePts,
          pos_gained: posGained,
          overall: overall,
          dnf: isDNF,
        };
      });

      RACE_DATA[raceName] = newRaceData;
      updatedCount++;
    }

    dot.className = 'api-dot live'; statusText.textContent = 'Verbunden';
    document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString('de-DE');
    
    // Re-render active tab
    renderStandings();
    const activeTab = document.querySelector('.nav-tab.active')?.dataset?.tab;
    if (activeTab === 'history') renderHistory();
    if (activeTab === 'racedetail') renderRaceSelect();
    if (activeTab === 'drivers') renderDriversTable();

    if (updatedCount === 0) {
      showToast('ℹ️ Keine neuen Rennen gefunden (alle vorhandenen Daten sind aktuell)', 'success');
    } else {
      showToast(`✅ ${updatedCount} neue Rennen geladen`, 'success');
    }
  } catch (e) {
    console.error('API Error:', e);
    dot.className = 'api-dot error'; statusText.textContent = 'Offline / Fehler';
    showToast(`⚠️ API-Fehler: ${e.message}. Lokale Daten wurden nicht verändert.`, 'error');
  }

  btn.disabled = false; btn.textContent = '🔄 Aktualisieren';
}

function normalizeName(name) {
  return name.toLowerCase()
    .replace(/ü/g, 'u').replace(/ö/g, 'o').replace(/ä/g, 'a')
    .replace(/ß/g, 'ss')
    .replace(/[éèê]/g, 'e').replace(/[àâ]/g, 'a').replace(/[îï]/g, 'i')
    .replace(/[óô]/g, 'o').replace(/[ú]/g, 'u').replace(/ñ/g, 'n');
}

function findByPartial(obj, key) {
  const match = Object.keys(obj).find(k => k.includes(key) || key.includes(k));
  return match ? obj[match] : null;
}
function findEntryByPartial(obj, key) {
  const match = Object.keys(obj).find(k => k.includes(key) || key.includes(k));
  return match ? obj[match] : null;
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => { t.className = 'toast'; }, 3500);
}

// ============================================================
// INIT
// ============================================================
window.addEventListener('load', () => {
  renderStandings();
  document.getElementById('lastUpdated').textContent = '–';
  document.getElementById('apiDot').className = 'api-dot';
  document.getElementById('apiStatusText').textContent = 'Lade Daten...';
  // Auto-fetch results from API on page load
  fetchLatestResults();
});
</script>
